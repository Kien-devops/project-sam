AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: Hello World Lambda Stack

Parameters:
  SharedLayerArn:
    Type: String
    Description: "ARN of the shared Lambda layer"

Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: app.lambda_handler
      Runtime: python3.13
      Architectures:
        - x86_64
      Layers:
        - !Ref SharedLayerArn

Outputs:
  HelloWorldFunctionArn:
    Description: "ARN of the HelloWorld function"
    Value: !GetAtt HelloWorldFunction.Arn
