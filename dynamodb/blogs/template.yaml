AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: Blogs DynamoDB Table stack

Resources:
  BlogsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: project-sam-blogs
      PrimaryKey:
        Name: id
        Type: String
      SSESpecification:
        SSEEnabled: true

Outputs:
  TableName:
    Description: "Name of the DynamoDB blogs table"
    Value: !Ref BlogsTable
  TableArn:
    Description: "ARN of the DynamoDB blogs table"
    Value: !GetAtt BlogsTable.Arn
