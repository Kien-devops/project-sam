AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: Comments DynamoDB metadata table stack

Resources:
  CommentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: project-sam-comments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

Outputs:
  TableName:
    Description: "Name of the DynamoDB comments metadata table"
    Value: !Ref CommentsTable
  TableArn:
    Description: "ARN of the DynamoDB comments metadata table"
    Value: !GetAtt CommentsTable.Arn
