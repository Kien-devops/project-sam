AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: Timeline DynamoDB Table stack

Resources:
  TimelineTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: project-sam-timeline
      PrimaryKey:
        Name: id
        Type: String
      SSESpecification:
        SSEEnabled: true

Outputs:
  TableName:
    Description: "Name of the DynamoDB timeline table"
    Value: !Ref TimelineTable
  TableArn:
    Description: "ARN of the DynamoDB timeline table"
    Value: !GetAtt TimelineTable.Arn
