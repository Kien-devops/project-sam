AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: >
  project-sam

  Root orchestrator template for project-sam, managing nested stacks divided
  into resource types and domain/feature folders for maximum scalability.

Resources:
  BlogsDBStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: dynamodb/blogs/template.yaml

  ProjectsDBStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: dynamodb/projects/template.yaml

  CommentsDBStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: dynamodb/comments/template.yaml

  CommentsContentStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: s3/comments/template.yaml

  BlogsLambdaStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/blogs/template.yaml
      Parameters:
        TableName: !GetAtt BlogsDBStack.Outputs.TableName

  ProjectsLambdaStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/projects/template.yaml
      Parameters:
        TableName: !GetAtt ProjectsDBStack.Outputs.TableName

  CommentsLambdaStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/comments/template.yaml
      Parameters:
        TableName: !GetAtt CommentsDBStack.Outputs.TableName
        ContentBucketName: !GetAtt CommentsContentStack.Outputs.BucketName

  PortfolioApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: apigateway/portfolio/template.yaml
      Parameters:
        BlogsFunctionArn: !GetAtt BlogsLambdaStack.Outputs.BlogsFunctionArn
        ProjectsFunctionArn: !GetAtt ProjectsLambdaStack.Outputs.ProjectsFunctionArn
        CommentsFunctionArn: !GetAtt CommentsLambdaStack.Outputs.CommentsFunctionArn

Outputs:
  PortfolioApi:
    Description: "Base URL for Portfolio API"
    Value: !GetAtt PortfolioApiStack.Outputs.ApiUrl
  BlogsApi:
    Description: "Base URL for Blogs API"
    Value: !Sub "${PortfolioApiStack.Outputs.ApiUrl}/blogs"
  ProjectsApi:
    Description: "Base URL for Projects API"
    Value: !Sub "${PortfolioApiStack.Outputs.ApiUrl}/projects"
  CommentsApi:
    Description: "Base URL pattern for Blog Comments API"
    Value: !Sub "${PortfolioApiStack.Outputs.ApiUrl}/blogs/{id}/comments"
  BlogsDynamoDBTableName:
    Description: "Name of the DynamoDB blogs table"
    Value: !GetAtt BlogsDBStack.Outputs.TableName
  ProjectsDynamoDBTableName:
    Description: "Name of the DynamoDB projects table"
    Value: !GetAtt ProjectsDBStack.Outputs.TableName
  CommentsDynamoDBTableName:
    Description: "Name of the DynamoDB comments metadata table"
    Value: !GetAtt CommentsDBStack.Outputs.TableName
  CommentsContentBucketName:
    Description: "Name of the S3 bucket storing comment content"
    Value: !GetAtt CommentsContentStack.Outputs.BucketName
