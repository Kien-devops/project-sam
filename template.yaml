AWSTemplateFormatVersion: '2010-09-09'
Transform: 'AWS::Serverless-2016-10-31'
Description: >
  project-sam

  Root orchestrator template for project-sam, managing nested stacks divided
  into resource types and domain/feature folders for maximum scalability.

Resources:
  # 1. DynamoDB Stack for Items
  ItemsDBStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: dynamodb/items/template.yaml

  BlogsDBStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: dynamodb/blogs/template.yaml

  ProjectsDBStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: dynamodb/projects/template.yaml

  # 2. Shared Lambda Layer Stack
  SharedLayerStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/shared/template.yaml

  # 3. Lambda Stack for Hello World
  HelloLambdaStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/hello_world/template.yaml
      Parameters:
        SharedLayerArn: !GetAtt SharedLayerStack.Outputs.SharedLayerArn

  # 4. Lambda Stack for Items
  ItemsLambdaStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/items/template.yaml
      Parameters:
        SharedLayerArn: !GetAtt SharedLayerStack.Outputs.SharedLayerArn
        TableName: !GetAtt ItemsDBStack.Outputs.TableName

  BlogsLambdaStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/blogs/template.yaml
      Parameters:
        TableName: !GetAtt BlogsDBStack.Outputs.TableName

  ProjectsLambdaStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: lambda/projects/template.yaml
      Parameters:
        TableName: !GetAtt ProjectsDBStack.Outputs.TableName

  # 5. API Gateway Stack for Hello World
  HelloApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: apigateway/hello_world/template.yaml
      Parameters:
        HelloWorldFunctionArn: !GetAtt HelloLambdaStack.Outputs.HelloWorldFunctionArn

  # 6. API Gateway Stack for Items
  ItemsApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: apigateway/items/template.yaml
      Parameters:
        CreateItemFunctionArn: !GetAtt ItemsLambdaStack.Outputs.CreateItemFunctionArn
        DeleteItemFunctionArn: !GetAtt ItemsLambdaStack.Outputs.DeleteItemFunctionArn

  # 7. Portfolio API Gateway Stack for Blogs and Projects
  PortfolioApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: apigateway/portfolio/template.yaml
      Parameters:
        BlogsFunctionArn: !GetAtt BlogsLambdaStack.Outputs.BlogsFunctionArn
        ProjectsFunctionArn: !GetAtt ProjectsLambdaStack.Outputs.ProjectsFunctionArn

Outputs:
  HelloWorldApi:
    Description: "Base URL for Hello World API"
    Value: !Sub "${HelloApiStack.Outputs.ApiUrl}/hello"
  CreateItemApi:
    Description: "Base URL for Create Item API"
    Value: !Sub "${ItemsApiStack.Outputs.ApiUrl}/items"
  DeleteItemApi:
    Description: "Base URL for Delete Item API"
    Value: !Sub "${ItemsApiStack.Outputs.ApiUrl}/items/{id}"
  DynamoDBTableName:
    Description: "Name of the DynamoDB table created"
    Value: !GetAtt ItemsDBStack.Outputs.TableName
  PortfolioApi:
    Description: "Base URL for Portfolio API"
    Value: !GetAtt PortfolioApiStack.Outputs.ApiUrl
  BlogsApi:
    Description: "Base URL for Blogs API"
    Value: !Sub "${PortfolioApiStack.Outputs.ApiUrl}/blogs"
  ProjectsApi:
    Description: "Base URL for Projects API"
    Value: !Sub "${PortfolioApiStack.Outputs.ApiUrl}/projects"
  BlogsDynamoDBTableName:
    Description: "Name of the DynamoDB blogs table"
    Value: !GetAtt BlogsDBStack.Outputs.TableName
  ProjectsDynamoDBTableName:
    Description: "Name of the DynamoDB projects table"
    Value: !GetAtt ProjectsDBStack.Outputs.TableName
